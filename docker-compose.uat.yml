services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: land_list_be_uat
    ports:
      - "55432:5432"

  be:
    build:
      context: ./land-list-be
      dockerfile: Dockerfile.dev
    environment:
      RAILS_ENV: uat
      JWT_SECRET: uat-secret-change-me
      CORS_ORIGINS: http://localhost:3100
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_NAME: land_list_be_uat
    ports:
      - "3101:3000"
    depends_on:
      - db

  fe:
    build:
      context: ./land-list-fe
      dockerfile: Dockerfile.dev
    environment:
      REACT_APP_API_BASE_URL: http://localhost:3101
    ports:
      - "3100:3000"
    depends_on:
      - be

